name = "reality-relay"
main = "relay.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Set ORIGIN to your REALITY server address (host:port).
# Override per environment or via `wrangler secret put ORIGIN`.
[vars]
ORIGIN = "YOUR_VPS_IP:443"

# Optional: bind to a custom domain instead of *.workers.dev.
# [routes]
# routes = [{ pattern = "relay.example.com/*", zone_name = "example.com" }]
